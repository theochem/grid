name: deploy-book

# Only run this when master/main/website branches change
on:
  push:
    branches:
      - master
      - main
      - website

  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - master

# This job installs dependencies, builds the book, and pushes it to `gh-pages`
jobs:
  deploy-book:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      # https://github.com/JamesIves/github-pages-deploy-action/issues/1110
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Install dependencies
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r website/requirements.txt

      # Install Grid
      - name: Install package
        run: |
          pip install -e .

      # Build the API docs
      - name: Build the API documentation
        run: |
          rm -rf website/pyapi
          python -m sphinx.ext.apidoc -o website/pyapi src/grid src/grid/tests/ src/grid/test/ src/grid/data/ -e -f

      # Copy notebooks into the book so CI always builds from grid/notebooks
      - name: Stage notebooks for website build
        run: |
          rm -rf website/tutorial
          cp -r notebooks website/tutorial

      # Build the book
      - name: Build the website
        run: |
          jupyter-book build ./website/

      # Push the book's HTML to github-pages
      # only push to gh-pages if the master/main branch has been updated
      - name: GitHub Pages Action
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') }}
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/_build/html
          publish_branch: gh-pages
          cname: grid.qcdevs.org
